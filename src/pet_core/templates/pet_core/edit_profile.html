{% extends 'pet_core/base.html' %}

{% block title %}Edit Profile - Pet Platform{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-secondary text-white">
                <h5 class="mb-0">Edit Personal Information</h5>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Username (Cannot be changed)</label>
                        <input type="text" class="form-control" value="{{ user.username }}" disabled>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="email" class="form-control" value="{{ user.email }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Phone Number</label>
                        <input type="text" name="phone" class="form-control" value="{{ owner.phone }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Province / City</label>
                        <div class="row g-2">
                            <div class="col-md-6">
                                <select name="province" class="form-select" id="ownerProvinceSelect"></select>
                            </div>
                            <div class="col-md-6">
                                <select name="city" class="form-select" id="ownerCitySelect"></select>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">District</label>
                        <select name="district" class="form-select" id="ownerDistrictSelect"></select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Detailed Address</label>
                        <textarea name="address_detail" class="form-control" rows="3">{{ initial_address_detail }}</textarea>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{% url 'owner_dashboard' %}" class="btn btn-light">Cancel</a>
                        <button type="submit" class="btn btn-primary px-4">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
{% load static %}
<script src="{% static 'pet_core/address_cn_3level_cdn.js' %}"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        if (typeof window.initCnProvinceCityDistrict === 'function') {
            window.initCnProvinceCityDistrict({
                provinceSelectId: 'ownerProvinceSelect',
                citySelectId: 'ownerCitySelect',
                districtSelectId: 'ownerDistrictSelect',
                initialProvince: '{{ initial_province|escapejs }}',
                initialCity: '{{ initial_city|escapejs }}',
                initialDistrict: '{{ initial_district|escapejs }}'
            })
        }
    })
</script>
{% endblock %}
