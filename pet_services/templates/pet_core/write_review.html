{% extends 'pet_core/base.html' %}

{% block title %}Write a Review - Pet Platform{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Rate your experience</h5>
            </div>
            <div class="card-body p-4">
                <div class="mb-4">
                    <p class="mb-1 text-muted">Service: <strong>{{ order.service.name }}</strong></p>
                    <p class="mb-0 text-muted">Merchant: <strong>{{ order.service.merchant.store_name }}</strong></p>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold">Star Rating (1-5)</label>
                        <select name="rating" class="form-select form-select-lg text-warning" required>
                            <option value="5">★★★★★ (5 - Excellent)</option>
                            <option value="4">★★★★☆ (4 - Good)</option>
                            <option value="3">★★★☆☆ (3 - Average)</option>
                            <option value="2">★★☆☆☆ (2 - Poor)</option>
                            <option value="1">★☆☆☆☆ (1 - Terrible)</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Your Review</label>
                        <textarea name="comment" class="form-control" rows="4" placeholder="Tell us about your experience (optional)..."></textarea>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{% url 'owner_dashboard' %}" class="btn btn-light">Cancel</a>
                        <button type="submit" class="btn btn-primary px-4">Submit Review</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
